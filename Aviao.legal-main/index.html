<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="painel">
            <h1>Aeroporto Inteligente ✈️</h1>
            <img id="imagem-aviao" src="aviao.png" alt="Avião" width="150">
            <div id="info-voo">
                <p><strong>Voo:</strong> <span id="codigo">---</span></p>
                <p><strong>Rota:</strong> <span id="rota">---</span></p>
                <p><strong>Horário:</strong> <span id="horario">---</span></p>
                <p class="destaque"><strong>Status:</strong> <span id="status">Carregando...</span></p>
            </div>
            <div class="controles">
                <button id="btn-decolar">Decolar</button>
                <button id="btn-pousar">Pousar</button>
            </div>
        </div>

        <div class="painel" id="painel-jato">
    <h2>Jato Executivo 🛩️</h2>
    <div id="info-voo">
        <p><strong>Voo:</strong> <span id="jato-codigo">---</span></p>
        <p><strong>Altitude:</strong> <span id="jato-altitude">0</span> pés</p>
        <p><strong>Supersônico:</strong> <span id="jato-status-super">Desativado</span></p>
    </div>
    <div class="controles">
        <button id="btn-jato-decolar">Decolar</button>
        <button id="btn-jato-pousar">Pousar</button> 
        <button id="btn-super-on">Ativar Supersônico</button>
        <button id="btn-super-off">Desativar Supersônico</button>
    </div>
</div>

        <div class="painel" id="painel-carga">
            <h2>Voo Cargueiro 📦</h2>
            <div id="info-voo">
                <p><strong>Voo:</strong> <span id="carga-codigo">---</span></p>
                <p><strong>Carga Atual:</strong> <span id="carga-atual">0</span> / <span id="carga-max">0</span> kg</p>
            </div>
            <div class="controles input-group">
                <input type="number" id="input-peso" placeholder="Peso em kg">
                <button id="btn-embarcar">Embarcar Carga</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
